apiVersion: sbomscanner.kubewarden.io/v1alpha1
kind: NodeScanConfiguration
metadata:
  name: default
spec:
  # skipPatterns is defaulted by the CRD to skip container-runtime state
  # (containerd/docker/k3s/rke2/podman). To opt out of all defaults and
  # scan everything, set skipPatterns explicitly to an empty list:
  #   skipPatterns: []
  scanInterval: 5m
  nodeSelector:
    matchExpressions:
      - key: kubernetes.io/hostname
        operator: In
        values:
          - "node1"
          - "node2"
  platforms:
    - arch: "amd64"
      os: "linux"
