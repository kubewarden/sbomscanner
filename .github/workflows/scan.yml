name: scan
on:
  push:
    paths:
      - go.sum
      - go.mod
  pull_request:
    paths:
      - go.sum
      - go.mod
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: read

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    env:
      GOEXPERIMENT: jsonv2
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Run govulncheck
        # With `output-format: sarif` the action exits 0 even when
        # vulnerabilities are found; findings are surfaced via the SARIF
        # upload below. See https://pkg.go.dev/golang.org/x/vuln/cmd/govulncheck#hdr-Exit_codes
        uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1.0.4
        with:
          # Override the default 'stable' so go-version-file is actually used
          # (setup-go gives precedence to go-version over go-version-file).
          go-version-input: ""
          go-version-file: go.mod
          go-package: ./...
          output-format: sarif
          output-file: govulncheck.sarif
          repo-checkout: false
      - name: Upload SARIF to GitHub Security tab
        # Skip for PRs from forks: GitHub strips `security-events: write` from
        # the token in that case, so the upload would fail. The SARIF is still
        # available as a workflow artifact (uploaded below) for reviewers.
        if: github.event.pull_request.head.repo.fork != true
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        with:
          sarif_file: govulncheck.sarif
          category: govulncheck
      - name: Upload SARIF as workflow artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: govulncheck-sarif
          path: govulncheck.sarif
          if-no-files-found: warn

  trivy:
    name: trivy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Trivy
        env:
          # renovate: datasource=github-releases depName=aquasecurity/trivy
          TRIVY_VERSION: "0.70.0"
        run: |
          set -euo pipefail
          curl -fsSL -o trivy.tar.gz \
            "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          tar -xzf trivy.tar.gz trivy
          sudo install -m 0755 trivy /usr/local/bin/trivy
          rm -f trivy trivy.tar.gz
          trivy --version
      - name: Run Trivy filesystem scan
        # Exit 0 so findings are surfaced via the SARIF upload below rather
        # than failing the job.
        run: |
          trivy fs \
            --scanners vuln \
            --format sarif \
            --output trivy.sarif \
            --exit-code 0 \
            go.mod
      - name: Upload SARIF to GitHub Security tab
        # Skip for PRs from forks: GitHub strips `security-events: write` from
        # the token in that case, so the upload would fail. The SARIF is still
        # available as a workflow artifact (uploaded below) for reviewers.
        if: github.event.pull_request.head.repo.fork != true
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        with:
          sarif_file: trivy.sarif
          category: trivy
      - name: Upload SARIF as workflow artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-sarif
          path: trivy.sarif
          if-no-files-found: warn
